<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#ffffff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="حجز الإجازات">
    <title>نظام حجز الإجازات الأسبوعية</title>
    
    <!-- PWA Manifest (يجعل الموقع قابلاً للتثبيت كتطبيق) -->
    <link rel="manifest" href="data:application/manifest+json;base64,ewogICJuYW1lIjogIk1vZGVyYXRpb24gVGVhbSBMZWF2ZXMiLAogICJzaG9ydF9uYW1lIjogIkxlYXZlcyIsCiAgInN0YXJ0X3VybCI6ICIuIiwKICAiZGlzcGxheSI6ICJzdGFuZGFsb25lIiwKICAiYmFja2dyb3VuZF9jb2xvciI6ICIjZjgxYTNiIiwKICAiZGVzY3JpcHRpb24iOiAiTW9kZXJhdGlvbiBUZWFtIExlYXZlcyBCb29raW5nIFN5c3RlbSIsCiAgImljb25zIjogWwogICAgewogICAgICAic3JjIjogImh0dHBzOi8vdXBsb2FkLndpa2ltZWRpYS5vcmcvd2lraXBlZGlhL2NvbW1vbnMvdGh1bWIvYi9iOC9GYWNlYm9va19pY29uXzIwMTMuc3ZnLzUxMnB4LUZhY2Vib29rX2ljb25fMjAxMy5zdmcucG5nIiwKICAgICAgInNpemVzIjogIjUxMng1MTIiLAogICAgICAidHlwZSI6ICJpbWFnZS9wbmciCiAgICB9CiAgXQp9">
    
    <!-- أيقونة التطبيق للآيفون -->
    <link rel="apple-touch-icon" href="https://upload.wikimedia.org/wikipedia/commons/thumb/b/b8/Facebook_icon_2013.svg/512px-Facebook_icon_2013.svg.png">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel (لتحويل كود React ليعمل في المتصفح) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; -webkit-tap-highlight-color: transparent;}
        
        /* تأثيرات إضافية للتطبيق */
        .app-container {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* حركات بصرية (Animations) */
        .fade-in-up {
            animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(20px);
        }
        .delay-100 { animation-delay: 100ms; }
        .delay-200 { animation-delay: 200ms; }
        @keyframes fadeInUp {
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- الأيقونات ---
        const Facebook = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"></path></svg>;
        const CalendarDays = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="18" height="18" x="3" y="4" rx="2" ry="2"></rect><line x1="16" x2="16" y1="2" y2="6"></line><line x1="8" x2="8" y1="2" y2="6"></line><line x1="3" x2="21" y1="10" y2="10"></line><path d="M8 14h.01"></path><path d="M12 14h.01"></path><path d="M16 14h.01"></path><path d="M8 18h.01"></path><path d="M12 18h.01"></path><path d="M16 18h.01"></path></svg>;
        const Clock = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>;
        const Calendar = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="18" height="18" x="3" y="4" rx="2" ry="2"></rect><line x1="16" x2="16" y1="2" y2="6"></line><line x1="8" x2="8" y1="2" y2="6"></line><line x1="3" x2="21" y1="10" y2="10"></line></svg>;
        const AlertCircle = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"></circle><line x1="12" x2="12" y1="8" y2="12"></line><line x1="12" x2="12.01" y1="16" y2="16"></line></svg>;
        const CheckCircle2 = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"></circle><path d="m9 12 2 2 4-4"></path></svg>;
        const Users = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M22 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>;
        const Download = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>;
        const Trash2 = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 6h18"></path><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"></path><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>;
        const RefreshCw = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path><path d="M3 3v5h5"></path></svg>;

        // --- البيانات الأساسية ---
        const EMPLOYEES = [
            { id: '31279', name: 'محمد إيهاب' },
            { id: '300093', name: 'عبد الرحمن شوقي' },
            { id: '3281', name: 'خالد خيري' },
            { id: '3457', name: 'بدر' },
            { id: '3340', name: 'محمود إبراهيم' },
            { id: '300094', name: 'شادي' }
        ];

        const DAYS_OF_WEEK = ['السبت', 'الأحد', 'الإثنين', 'الثلاثاء', 'الأربعاء', 'الخميس', 'الجمعة'];

        // ==========================================
        // ⚠️ ضع رابط جوجل سكريبت الخاص بك هنا بين علامتي التنصيص ⚠️
        // ==========================================
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxdDVjIdTZi1zwqCw7IcLzycBcApfh2T3Wyyz8g2ZS_OtjcbidW-C3f8hJWd8MeWPXk/exec';
        
        function App() {
            const [isOpen, setIsOpen] = useState(false);
            const [isAdmin, setIsAdmin] = useState(false); // تم تغييرها من testMode لتشمل صلاحيات الإدارة
            
            const [selectedEmpId, setSelectedEmpId] = useState('');
            const [selectedDay, setSelectedDay] = useState('');
            const [note, setNote] = useState('');
            
            const [bookings, setBookings] = useState([]);
            const [message, setMessage] = useState({ type: '', text: '' });
            const [isLoading, setIsLoading] = useState(false);
            const [isFetching, setIsFetching] = useState(true);
            const [deferredPrompt, setDeferredPrompt] = useState(null);
            const [showInstallBtn, setShowInstallBtn] = useState(false);
            
            // قراءة الموظف المرتبط بهذا الجهاز من الـ Local Storage
            const [myDeviceEmpId, setMyDeviceEmpId] = useState(localStorage.getItem('myDeviceEmpId') || '');

            // التحقق من الوقت وجلب البيانات، وإعدادات التثبيت PWA
            useEffect(() => {
                const today = new Date().getDay();
                // 3 = الأربعاء، 4 = الخميس، 5 = الجمعة
                if (today >= 3 && today <= 5) {
                    setIsOpen(true);
                } else {
                    setIsOpen(false);
                }

                fetchBookings();

                // كود لالتقاط حدث تثبيت التطبيق
                window.addEventListener('beforeinstallprompt', (e) => {
                    e.preventDefault();
                    setDeferredPrompt(e);
                    setShowInstallBtn(true);
                });

            }, []);

            // دالة تثبيت التطبيق
            const handleInstallClick = async () => {
                if (deferredPrompt) {
                    deferredPrompt.prompt();
                    const { outcome } = await deferredPrompt.userChoice;
                    if (outcome === 'accepted') {
                        setShowInstallBtn(false);
                    }
                    setDeferredPrompt(null);
                }
            };

            // دالة جلب البيانات من جوجل شيت
            const fetchBookings = async () => {
                if (SCRIPT_URL === 'ضع_الرابط_هنا') {
                    setIsFetching(false);
                    return;
                }
                
                setIsFetching(true);
                try {
                    const response = await fetch(SCRIPT_URL);
                    const data = await response.json();
                    setBookings(data);
                } catch (error) {
                    console.error('Error fetching data:', error);
                } finally {
                    setIsFetching(false);
                }
            };

            // دالة إرسال الحجز لجوجل شيت
            const handleSubmit = async (e) => {
                e.preventDefault();
                setMessage({ type: '', text: '' });
                
                if (!selectedEmpId || !selectedDay) {
                    setMessage({ type: 'error', text: 'يرجى اختيار الاسم واليوم المطلوب.' });
                    return;
                }

                setIsLoading(true);

                if (SCRIPT_URL === 'ضع_الرابط_هنا') {
                    setMessage({ type: 'error', text: 'يرجى وضع رابط جوجل سكريبت في الكود لكي يعمل النظام.' });
                    setIsLoading(false);
                    return;
                }

                const empName = EMPLOYEES.find(emp => emp.id === selectedEmpId)?.name;
                const requestData = { 
                    day: selectedDay, 
                    name: empName, 
                    empId: selectedEmpId, 
                    note: note.trim() 
                };

                try {
                    const response = await fetch(SCRIPT_URL, {
                        method: 'POST',
                        body: JSON.stringify(requestData),
                        headers: {
                            'Content-Type': 'text/plain;charset=utf-8',
                        }
                    });
                    
                    const result = await response.json();
                    
                    if (result.success) {
                        setMessage({ type: 'success', text: result.message });
                        
                        // حفظ هوية الموظف على هذا الجهاز لكي يتمكن من التعديل/الإلغاء (إلا إذا كان المشرف هو من يحجز)
                        if (!isAdmin) {
                            localStorage.setItem('myDeviceEmpId', selectedEmpId);
                            setMyDeviceEmpId(selectedEmpId);
                        }
                        
                        setSelectedDay('');
                        setSelectedEmpId('');
                        setNote('');
                        fetchBookings(); // تحديث الجدول فوراً بعد الحجز
                    } else {
                        setMessage({ type: 'error', text: result.message });
                        fetchBookings(); // تحديث الجدول ربما يكون شخص آخر حجز
                    }
                } catch (error) {
                    setMessage({ type: 'error', text: 'حدث خطأ في الاتصال بالخادم. تأكد من إعدادات جوجل شيت.' });
                    console.error(error);
                } finally {
                    setIsLoading(false);
                }
            };

            // دالة إلغاء الحجز (لصاحب الجهاز أو المشرف)
            const handleCancel = async (empIdToCancel, isByAdmin = false) => {
                const confirmMsg = isByAdmin 
                    ? 'بصفتك مشرف: هل أنت متأكد من إلغاء حجز هذا الموظف؟' 
                    : 'هل أنت متأكد أنك تريد إلغاء حجزك ليوم الإجازة؟';

                if (!window.confirm(confirmMsg)) return;

                setIsLoading(true);
                try {
                    const response = await fetch(SCRIPT_URL, {
                        method: 'POST',
                        body: JSON.stringify({ action: 'cancel', empId: empIdToCancel }),
                        headers: {
                            'Content-Type': 'text/plain;charset=utf-8',
                        }
                    });
                    
                    const result = await response.json();
                    
                    if (result.success) {
                        setMessage({ type: 'success', text: 'تم إلغاء الحجز بنجاح' });
                        
                        // إزالة الارتباط بالجهاز بعد الإلغاء فقط إذا كان هو صاحب الحجز
                        if (!isByAdmin) {
                            localStorage.removeItem('myDeviceEmpId');
                            setMyDeviceEmpId('');
                        }
                        fetchBookings();
                    } else {
                        setMessage({ type: 'error', text: result.message });
                    }
                } catch (error) {
                    setMessage({ type: 'error', text: 'حدث خطأ أثناء الإلغاء.' });
                    console.error(error);
                } finally {
                    setIsLoading(false);
                }
            };

            const isSystemActive = isOpen || isAdmin;

            return (
                <div className="app-container text-right" dir="rtl">
                    {/* Header */}
                    <header className="bg-white border-t-8 border-red-600 shadow-sm mb-6 pb-2 relative">
                        {/* زر تحميل التطبيق يظهر فقط إذا كان متاحاً (على الموبايل) */}
                        {showInstallBtn && (
                           <button 
                                onClick={handleInstallClick}
                                className="absolute top-4 left-4 flex items-center gap-1.5 bg-slate-100 hover:bg-slate-200 text-slate-700 text-xs px-3 py-1.5 rounded-full shadow-sm border border-slate-200 transition-colors"
                            >
                                <Download className="w-3.5 h-3.5" />
                                <span>تثبيت كتطبيق</span>
                            </button>
                        )}

                        <div className="container mx-auto px-4 pt-8 pb-4 max-w-3xl text-center flex flex-col items-center">
                            
                            {/* استبدال اللوجو القديم بكود SVG مباشر لكي لا يختفي أبداً */}
                            <svg 
                                xmlns="http://www.w3.org/2000/svg" 
                                viewBox="0 0 24 24" 
                                className="w-16 h-16 md:w-20 md:h-20 mb-3 drop-shadow-sm text-[#1877F2]" 
                                fill="currentColor"
                            >
                                <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.469h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.469h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
                            </svg>
                            
                            <h1 className="text-3xl md:text-5xl font-black text-red-600 uppercase tracking-widest mb-3">
                                Moderation Team
                            </h1>
                            
                            <div className="flex justify-center items-center gap-2 text-[#2e9474] mb-4">
                                <h2 className="text-xl md:text-2xl font-bold">نظام حجز الإجازات الأسبوعية</h2>
                            </div>
                            
                            <div className="inline-flex items-center gap-2 bg-slate-50 text-slate-600 px-3 py-1.5 md:px-4 md:py-2 rounded-full text-xs md:text-sm font-medium border border-slate-200 shadow-sm">
                                <Clock className="w-4 h-4 text-[#2e9474] shrink-0" />
                                <span className="leading-tight">مواعيد الحجز: من الأربعاء حتى الجمعة (الجدول يتجدد أسبوعياً)</span>
                            </div>
                        </div>
                    </header>

                    <main className="container mx-auto px-4 pb-12 max-w-3xl flex-grow">
                        {/* بانر حالة النظام */}
                        <div className={`fade-in-up rounded-xl p-4 mb-6 flex items-start md:items-center justify-between shadow-sm border ${isSystemActive ? 'bg-blue-50/80 border-blue-200' : 'bg-red-50/80 border-red-200'}`}>
                            <div className="flex items-start gap-3">
                                <Clock className={`w-5 h-5 md:w-6 md:h-6 mt-0.5 shrink-0 ${isSystemActive ? 'text-blue-600' : 'text-red-600'}`} />
                                <div>
                                    <h2 className={`font-semibold text-sm md:text-base mb-1 ${isSystemActive ? 'text-blue-800' : 'text-red-800'}`}>
                                        {isOpen ? 'النظام مفتوح الآن للتسجيل' : (isAdmin ? 'مفتوح كصلاحية مشرف' : 'النظام مغلق حالياً')}
                                    </h2>
                                    <p className={`text-xs md:text-sm leading-relaxed ${isSystemActive ? 'text-blue-600' : 'text-red-600'}`}>
                                        تفتح طلبات الإجازة من الأربعاء حتى الجمعة من كل أسبوع.
                                    </p>
                                </div>
                            </div>
                            <button 
                                onClick={() => {
                                    if (!isAdmin) {
                                        // طلب كلمة المرور
                                        const pass = prompt('أدخل الرمز السري للمشرفين:');
                                        if (pass === '1234') { // يمكنك تغيير الرقم 1234 لأي باسورد تريده من هنا
                                            setIsAdmin(true);
                                        } else if (pass !== null && pass !== "") {
                                            alert('الرمز السري غير صحيح!');
                                        }
                                    } else {
                                        setIsAdmin(false);
                                    }
                                }} 
                                className="text-xs shrink-0 bg-white shadow-sm border border-slate-200 hover:bg-slate-50 text-slate-700 px-3 py-1.5 rounded-md transition-colors flex items-center gap-1"
                            >
                                {isAdmin ? 'إغلاق وضع المشرف' : 'دخول المشرف 🔒'}
                            </button>
                        </div>

                        <div className="grid md:grid-cols-2 gap-6">
                            {/* نموذج الحجز */}
                            <div className="fade-in-up delay-100 bg-white rounded-2xl shadow-sm border border-slate-100 p-5 md:p-6 h-fit">
                                <h2 className="text-base md:text-lg font-bold text-slate-800 mb-5 pb-3 border-b border-slate-100 flex items-center gap-2">
                                    <Calendar className="w-5 h-5 text-[#2e9474]"/>
                                    طلب يوم إجازة
                                </h2>

                                {message.text && (
                                    <div className={`p-3 rounded-xl mb-5 text-sm flex items-start gap-2 border ${message.type === 'error' ? 'bg-red-50 text-red-700 border-red-100' : 'bg-green-50 text-green-700 border-green-100'}`}>
                                        {message.type === 'error' ? <AlertCircle className="w-5 h-5 shrink-0" /> : <CheckCircle2 className="w-5 h-5 shrink-0" />}
                                        <p className="mt-0.5 leading-relaxed">{message.text}</p>
                                    </div>
                                )}

                                <form onSubmit={handleSubmit} className="space-y-5">
                                    <div>
                                        <label className="block text-sm font-semibold text-slate-700 mb-2">الاسم / الرقم الوظيفي</label>
                                        <select value={selectedEmpId} onChange={(e) => setSelectedEmpId(e.target.value)} disabled={!isSystemActive || isLoading} className="w-full border border-slate-200 rounded-xl p-3 bg-slate-50 focus:bg-white focus:ring-2 focus:ring-[#2e9474]/20 focus:border-[#2e9474] outline-none transition-all disabled:opacity-50 text-sm">
                                            <option value="">اختر اسمك من القائمة...</option>
                                            {EMPLOYEES.map(emp => (
                                                <option key={emp.id} value={emp.id}>{emp.id} - {emp.name}</option>
                                            ))}
                                        </select>
                                    </div>

                                    <div>
                                        <label className="block text-sm font-semibold text-slate-700 mb-2">اليوم المطلوب</label>
                                        <div className="grid grid-cols-2 gap-2.5">
                                            {DAYS_OF_WEEK.map(day => {
                                                const isBooked = bookings.some(b => b.day === day);
                                                return (
                                                    <button key={day} type="button" disabled={!isSystemActive || isBooked || isLoading} onClick={() => setSelectedDay(day)}
                                                        className={`p-2.5 rounded-xl text-sm font-medium transition-all border ${selectedDay === day ? 'bg-[#2e9474] text-white border-[#2e9474] shadow-md shadow-[#2e9474]/20' : isBooked ? 'bg-slate-50 text-slate-400 border-slate-100 cursor-not-allowed opacity-60' : 'bg-white text-slate-700 border-slate-200 hover:border-[#2e9474]/50 hover:bg-slate-50 active:scale-[0.98]'}`}>
                                                        {day} {isBooked && '(محجوز)'}
                                                    </button>
                                                )
                                            })}
                                        </div>
                                    </div>

                                    <div>
                                        <label className="block text-sm font-semibold text-slate-700 mb-2">سبب أو ظرف مهم (اختياري)</label>
                                        <textarea value={note} onChange={(e) => setNote(e.target.value)} disabled={!isSystemActive || isLoading} placeholder="إذا كان لديك مشوار ضروري، يمكنك كتابته هنا..." className="w-full border border-slate-200 rounded-xl p-3 bg-slate-50 focus:bg-white focus:ring-2 focus:ring-[#2e9474]/20 focus:border-[#2e9474] outline-none transition-all disabled:opacity-50 resize-none h-24 text-sm leading-relaxed"></textarea>
                                    </div>

                                    <button type="submit" disabled={!isSystemActive || isLoading} className="w-full bg-[#2e9474] hover:bg-[#23785d] disabled:bg-slate-200 disabled:text-slate-400 disabled:cursor-not-allowed text-white font-bold py-3.5 px-4 rounded-xl transition-all flex justify-center items-center gap-2 shadow-sm shadow-[#2e9474]/20 active:scale-[0.98]">
                                        {isLoading ? (
                                            <span className="w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin"></span>
                                        ) : (
                                            'تأكيد الحجز'
                                        )}
                                    </button>
                                </form>
                            </div>

                            {/* جدول البيانات */}
                            <div className="fade-in-up delay-200 bg-white rounded-2xl shadow-sm border border-slate-100 p-5 md:p-6 h-fit flex flex-col">
                                <div className="flex justify-between items-center mb-5 pb-3 border-b border-slate-100">
                                    <h2 className="text-base md:text-lg font-bold text-slate-800 flex items-center gap-2">
                                        <Users className="w-5 h-5 text-blue-600"/>
                                        جدول إجازات الأسبوع
                                    </h2>
                                    <button 
                                        onClick={fetchBookings} 
                                        disabled={isFetching}
                                        className="text-slate-400 hover:text-[#2e9474] transition-colors p-1 rounded-full hover:bg-slate-50 active:scale-95"
                                        title="تحديث البيانات الفوري"
                                    >
                                        <RefreshCw className={`w-5 h-5 ${isFetching ? 'animate-spin text-[#2e9474]' : ''}`} />
                                    </button>
                                </div>
                                
                                {/* شريط اكتمال الحجوزات */}
                                <div className="mb-5 bg-slate-50 p-3 rounded-xl border border-slate-100">
                                    <div className="flex justify-between text-xs mb-1.5 font-medium text-slate-600">
                                        <span>أيام محجوزة: <span className="text-[#2e9474] font-bold">{bookings.length}</span></span>
                                        <span>المتبقي: <span className="font-bold">{DAYS_OF_WEEK.length - bookings.length}</span></span>
                                    </div>
                                    <div className="w-full bg-slate-200 rounded-full h-2.5 overflow-hidden">
                                        <div 
                                            className="bg-[#2e9474] h-2.5 rounded-full transition-all duration-1000 ease-out" 
                                            style={{ width: `${(bookings.length / DAYS_OF_WEEK.length) * 100}%` }}
                                        ></div>
                                    </div>
                                </div>
                                
                                {isFetching && bookings.length === 0 ? (
                                    <div className="flex justify-center py-10">
                                        <span className="w-8 h-8 border-4 border-[#2e9474]/20 border-t-[#2e9474] rounded-full animate-spin"></span>
                                    </div>
                                ) : bookings.length === 0 ? (
                                    <div className="bg-slate-50 rounded-xl p-8 text-center border border-slate-100">
                                        <Calendar className="w-8 h-8 text-slate-300 mx-auto mb-2" />
                                        <p className="text-slate-500 text-sm">لم يقم أحد بحجز إجازة بعد.</p>
                                    </div>
                                ) : (
                                    <div className="overflow-x-auto rounded-xl border border-slate-100 shadow-sm">
                                        <table className="w-full text-sm text-right">
                                            <thead className="bg-slate-50 text-slate-600">
                                                <tr>
                                                    <th className="px-4 py-3.5 font-semibold border-b border-slate-100">اليوم</th>
                                                    <th className="px-4 py-3.5 font-semibold border-b border-slate-100">الموظف</th>
                                                    <th className="px-4 py-3.5 font-semibold border-b border-slate-100">ملاحظات</th>
                                                    <th className="px-2 py-3.5 font-semibold border-b border-slate-100 w-10"></th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-slate-50">
                                                {bookings.map((booking, index) => {
                                                    // هل الحجز يخص الجهاز الحالي؟
                                                    const isMyBooking = booking.empId === myDeviceEmpId;
                                                    
                                                    return (
                                                        <tr key={index} className={`transition-colors ${isMyBooking ? 'bg-[#2e9474]/5 border-r-4 border-[#2e9474]' : 'hover:bg-slate-50/50'}`}>
                                                            <td className="px-4 py-3.5 font-bold text-[#2e9474] whitespace-nowrap w-1/4">
                                                                {booking.day}
                                                            </td>
                                                            <td className="px-4 py-3.5 text-slate-800 whitespace-nowrap">
                                                                <div className="font-medium">{booking.name}</div>
                                                                <div className="text-[10px] text-slate-400 mt-0.5">{booking.empId}</div>
                                                            </td>
                                                            <td className="px-4 py-3.5 text-slate-500 text-xs w-1/3 max-w-[120px] truncate" title={booking.note}>
                                                                {booking.note ? booking.note : <span className="text-slate-300">-</span>}
                                                            </td>
                                                            <td className="px-2 py-3.5 whitespace-nowrap text-left">
                                                                {/* يظهر زر الحذف إما لصاحب الحجز، أو للمشرف في كل الأوقات */}
                                                                {(isMyBooking || isAdmin) && (
                                                                    <button 
                                                                        onClick={() => handleCancel(booking.empId, !isMyBooking)}
                                                                        disabled={isLoading}
                                                                        className={`${!isMyBooking ? 'text-orange-500 hover:text-orange-700 bg-orange-50 hover:bg-orange-100' : 'text-red-500 hover:text-red-700 bg-red-50 hover:bg-red-100'} p-1.5 rounded-lg transition-colors flex items-center justify-center disabled:opacity-50`}
                                                                        title={isMyBooking ? "إلغاء حجزك" : "حذف كـ مشرف"}
                                                                    >
                                                                        <Trash2 className="w-4 h-4" />
                                                                    </button>
                                                                )}
                                                            </td>
                                                        </tr>
                                                    );
                                                })}
                                            </tbody>
                                        </table>
                                    </div>
                                )}
                            </div>
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
    
    <!-- Service Worker للتطبيق لكي يعمل بشكل صحيح كـ PWA -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                // ننشئ ملف Service Worker وهمي لكي يرضي المتصفح ويظهر زر التثبيت
                const swCode = `
                    self.addEventListener('install', (e) => { self.skipWaiting(); });
                    self.addEventListener('fetch', (e) => { });
                `;
                const blob = new Blob([swCode], {type: 'application/javascript'});
                const swUrl = URL.createObjectURL(blob);
                
                navigator.serviceWorker.register(swUrl)
                    .then(registration => { console.log('SW registered: ', registration); })
                    .catch(registrationError => { console.log('SW registration failed: ', registrationError); });
            });
        }
    </script>
</body>
</html>
