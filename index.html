<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moderation Team - نظام حجز الإجازات</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel (لتحويل كود React ليعمل في المتصفح) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- الأيقونات (بديل لمكتبة lucide لتعمل بدون تثبيت) ---
        const Facebook = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"></path></svg>;
        const CalendarDays = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="18" height="18" x="3" y="4" rx="2" ry="2"></rect><line x1="16" x2="16" y1="2" y2="6"></line><line x1="8" x2="8" y1="2" y2="6"></line><line x1="3" x2="21" y1="10" y2="10"></line><path d="M8 14h.01"></path><path d="M12 14h.01"></path><path d="M16 14h.01"></path><path d="M8 18h.01"></path><path d="M12 18h.01"></path><path d="M16 18h.01"></path></svg>;
        const Clock = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>;
        const Calendar = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="18" height="18" x="3" y="4" rx="2" ry="2"></rect><line x1="16" x2="16" y1="2" y2="6"></line><line x1="8" x2="8" y1="2" y2="6"></line><line x1="3" x2="21" y1="10" y2="10"></line></svg>;
        const AlertCircle = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"></circle><line x1="12" x2="12" y1="8" y2="12"></line><line x1="12" x2="12.01" y1="16" y2="16"></line></svg>;
        const CheckCircle2 = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"></circle><path d="m9 12 2 2 4-4"></path></svg>;
        const Users = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M22 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>;

        // --- البيانات الأساسية ---
        const EMPLOYEES = [
            { id: '31279', name: 'محمد إيهاب' },
            { id: '300093', name: 'عبد الرحمن شوقي' },
            { id: '3281', name: 'خالد خيري' },
            { id: '3457', name: 'بدر' },
            { id: '3340', name: 'محمود إبراهيم' },
            { id: '300094', name: 'شادي' }
        ];

        const DAYS_OF_WEEK = ['السبت', 'الأحد', 'الإثنين', 'الثلاثاء', 'الأربعاء', 'الخميس', 'الجمعة'];

        // --- التطبيق ---
        function App() {
            const [isOpen, setIsOpen] = useState(false);
            const [testMode, setTestMode] = useState(false);
            
            const [selectedEmpId, setSelectedEmpId] = useState('');
            const [selectedDay, setSelectedDay] = useState('');
            const [note, setNote] = useState('');
            
            const [bookings, setBookings] = useState([
                { day: 'الأحد', name: 'بدر', empId: '3457', note: 'مشوار عائلي ضروري' }
            ]);

            const [message, setMessage] = useState({ type: '', text: '' });
            const [isLoading, setIsLoading] = useState(false);

            useEffect(() => {
                const today = new Date().getDay();
                // 3 = الأربعاء، 4 = الخميس، 5 = الجمعة
                if (today >= 3 && today <= 5) {
                    setIsOpen(true);
                } else {
                    setIsOpen(false);
                }
            }, []);

            const handleSubmit = (e) => {
                e.preventDefault();
                setMessage({ type: '', text: '' });
                
                if (!selectedEmpId || !selectedDay) {
                    setMessage({ type: 'error', text: 'يرجى اختيار الاسم واليوم المطلوب.' });
                    return;
                }

                setIsLoading(true);

                // محاكاة الاتصال مؤقتاً (لاحقاً سنضيف كود جوجل شيت هنا)
                setTimeout(() => {
                    const existingBooking = bookings.find(b => b.day === selectedDay);
                    if (existingBooking) {
                        setIsLoading(false);
                        setMessage({ type: 'error', text: `عذراً، لا يمكن حجز هذا اليوم. تم حجزه مسبقاً بواسطة: ${existingBooking.name}` });
                        return;
                    }

                    const empAlreadyBooked = bookings.find(b => b.empId === selectedEmpId);
                    if (empAlreadyBooked) {
                        setIsLoading(false);
                        setMessage({ type: 'error', text: `عذراً، لقد قمت بحجز يوم ${empAlreadyBooked.day} مسبقاً. لا يمكن حجز أكثر من يوم.` });
                        return;
                    }

                    const empName = EMPLOYEES.find(emp => emp.id === selectedEmpId)?.name;
                    const newBooking = { day: selectedDay, name: empName, empId: selectedEmpId, note: note.trim() };
                    
                    setBookings([...bookings, newBooking]);
                    setIsLoading(false);
                    setMessage({ type: 'success', text: `تم تأكيد حجز إجازتك ليوم ${selectedDay} بنجاح!` });
                    setSelectedDay('');
                    setSelectedEmpId('');
                    setNote('');

                }, 1000);
            };

            const isSystemActive = isOpen || testMode;

            return (
                <div className="min-h-screen text-right" dir="rtl">
                    <header className="bg-white border-t-8 border-red-600 shadow-sm">
                        <div className="container mx-auto px-4 py-8 max-w-3xl text-center">
                            <div className="flex justify-center items-center gap-3 mb-3">
                                <Facebook className="w-10 h-10 md:w-12 md:h-12 text-blue-600" />
                                <h1 className="text-4xl md:text-5xl font-black text-red-600 uppercase tracking-widest">
                                    Moderation Team
                                </h1>
                            </div>
                            <div className="flex justify-center items-center gap-2 text-emerald-600 mb-5">
                                <CalendarDays className="w-7 h-7" />
                                <h2 className="text-2xl font-bold">نظام حجز الإجازات الأسبوعية</h2>
                            </div>
                            <div className="inline-flex items-center gap-2 bg-slate-50 text-slate-600 px-4 py-2 rounded-full text-sm font-medium border border-slate-200">
                                <Clock className="w-4 h-4 text-emerald-600" />
                                مواعيد الحجز: من الأربعاء حتى الجمعة (الجدول يتجدد أسبوعياً)
                            </div>
                        </div>
                    </header>

                    <main className="container mx-auto px-4 py-8 max-w-3xl">
                        <div className={`rounded-lg p-4 mb-8 flex items-center justify-between ${isSystemActive ? 'bg-blue-50 border border-blue-200' : 'bg-red-50 border border-red-200'}`}>
                            <div className="flex items-center gap-3">
                                <Clock className={`w-6 h-6 ${isSystemActive ? 'text-blue-600' : 'text-red-600'}`} />
                                <div>
                                    <h2 className={`font-semibold ${isSystemActive ? 'text-blue-800' : 'text-red-800'}`}>
                                        {isSystemActive ? 'النظام مفتوح الآن للتسجيل' : 'النظام مغلق حالياً'}
                                    </h2>
                                    <p className={`text-sm ${isSystemActive ? 'text-blue-600' : 'text-red-600'}`}>
                                        تفتح طلبات الإجازة من الأربعاء حتى الجمعة من كل أسبوع.
                                    </p>
                                </div>
                            </div>
                            {!isOpen && (
                                <button onClick={() => setTestMode(!testMode)} className="text-xs bg-slate-200 hover:bg-slate-300 text-slate-700 px-3 py-1 rounded transition-colors">
                                    {testMode ? 'إلغاء وضع التجربة' : 'تفعيل للتجربة'}
                                </button>
                            )}
                        </div>

                        <div className="grid md:grid-cols-2 gap-8">
                            <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-6 h-fit">
                                <h2 className="text-lg font-bold text-slate-800 mb-4 border-b pb-2 flex items-center gap-2">
                                    <Calendar className="w-5 h-5 text-emerald-600"/>
                                    طلب يوم إجازة
                                </h2>

                                {message.text && (
                                    <div className={`p-3 rounded-lg mb-4 text-sm flex items-start gap-2 ${message.type === 'error' ? 'bg-red-50 text-red-700 border border-red-200' : 'bg-green-50 text-green-700 border border-green-200'}`}>
                                        {message.type === 'error' ? <AlertCircle className="w-5 h-5 shrink-0" /> : <CheckCircle2 className="w-5 h-5 shrink-0" />}
                                        <p className="mt-0.5">{message.text}</p>
                                    </div>
                                )}

                                <form onSubmit={handleSubmit} className="space-y-5">
                                    <div>
                                        <label className="block text-sm font-medium text-slate-700 mb-1">الاسم / الرقم الوظيفي</label>
                                        <select value={selectedEmpId} onChange={(e) => setSelectedEmpId(e.target.value)} disabled={!isSystemActive || isLoading} className="w-full border border-slate-300 rounded-lg p-2.5 bg-slate-50 focus:bg-white focus:ring-2 focus:ring-emerald-500 outline-none transition-all disabled:opacity-50">
                                            <option value="">اختر اسمك من القائمة...</option>
                                            {EMPLOYEES.map(emp => (
                                                <option key={emp.id} value={emp.id}>{emp.id} - {emp.name}</option>
                                            ))}
                                        </select>
                                    </div>

                                    <div>
                                        <label className="block text-sm font-medium text-slate-700 mb-1">اليوم المطلوب</label>
                                        <div className="grid grid-cols-2 gap-2">
                                            {DAYS_OF_WEEK.map(day => {
                                                const isBooked = bookings.some(b => b.day === day);
                                                return (
                                                    <button key={day} type="button" disabled={!isSystemActive || isBooked || isLoading} onClick={() => setSelectedDay(day)}
                                                        className={`p-2 rounded-lg text-sm font-medium transition-all border ${selectedDay === day ? 'bg-emerald-600 text-white border-emerald-600 shadow-md' : isBooked ? 'bg-slate-100 text-slate-400 border-slate-200 cursor-not-allowed opacity-60' : 'bg-white text-slate-700 border-slate-300 hover:border-emerald-400 hover:bg-emerald-50'}`}>
                                                        {day} {isBooked && '(محجوز)'}
                                                    </button>
                                                )
                                            })}
                                        </div>
                                    </div>

                                    <div>
                                        <label className="block text-sm font-medium text-slate-700 mb-1">سبب أو ظرف مهم (اختياري)</label>
                                        <textarea value={note} onChange={(e) => setNote(e.target.value)} disabled={!isSystemActive || isLoading} placeholder="إذا كان لديك مشوار ضروري، يمكنك كتابته هنا..." className="w-full border border-slate-300 rounded-lg p-2.5 bg-slate-50 focus:bg-white focus:ring-2 focus:ring-emerald-500 outline-none transition-all disabled:opacity-50 resize-none h-20"></textarea>
                                    </div>

                                    <button type="submit" disabled={!isSystemActive || isLoading} className="w-full bg-emerald-600 hover:bg-emerald-700 disabled:bg-slate-300 disabled:cursor-not-allowed text-white font-bold py-3 px-4 rounded-lg transition-colors flex justify-center items-center gap-2">
                                        {isLoading ? (
                                            <span className="w-5 h-5 border-2 border-white border-t-transparent rounded-full animate-spin"></span>
                                        ) : (
                                            'تأكيد الحجز'
                                        )}
                                    </button>
                                </form>
                            </div>

                            <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-6 h-fit">
                                <h2 className="text-lg font-bold text-slate-800 mb-4 border-b pb-2 flex items-center gap-2">
                                    <Users className="w-5 h-5 text-blue-600"/>
                                    جدول إجازات هذا الأسبوع
                                </h2>
                                
                                {bookings.length === 0 ? (
                                    <p className="text-slate-500 text-center py-6 text-sm">لم يقم أحد بحجز إجازة بعد.</p>
                                ) : (
                                    <div className="overflow-hidden rounded-lg border border-slate-200">
                                        <table className="w-full text-sm text-right">
                                            <thead className="bg-slate-100 text-slate-700">
                                                <tr>
                                                    <th className="px-4 py-3 font-semibold">اليوم</th>
                                                    <th className="px-4 py-3 font-semibold">الموظف</th>
                                                    <th className="px-4 py-3 font-semibold">ملاحظات</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-slate-200">
                                                {bookings.map((booking, index) => (
                                                    <tr key={index} className="hover:bg-slate-50 transition-colors">
                                                        <td className="px-4 py-3 font-medium text-emerald-700 bg-emerald-50/30 whitespace-nowrap w-1/4">
                                                            {booking.day}
                                                        </td>
                                                        <td className="px-4 py-3 text-slate-800 whitespace-nowrap">
                                                            {booking.name} <span className="text-xs text-slate-400 mr-2">({booking.empId})</span>
                                                        </td>
                                                        <td className="px-4 py-3 text-slate-500 text-xs w-1/3">
                                                            {booking.note ? booking.note : <span className="text-slate-300">-</span>}
                                                        </td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                )}
                            </div>
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
